<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Bank Digital</title>
    <!-- Tambahkan library QR Scanner jika belum ada -->
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #preview { width: 100%; max-width: 300px; margin: 0 auto; }
    </style>
</head>
<body>
    <h1>Bank Monopoli</h1>
    <video id="preview"></video>
    
    <script>
        let scanner = new Instascan.Scanner({ video: document.getElementById('preview') });
        scanner.addListener('scan', function (content) {
            // 1. Munculkan input untuk nominal
            let nominal = prompt("QR Terdeteksi: " + content + "\nMasukkan jumlah uang yang ingin di-transfer:");
            
            // 2. Validasi input
            if (nominal !== null && nominal !== "") {
                if (confirm("Konfirmasi transfer sebesar " + nominal + " ke " + content + "?")) {
                    // 3. Proses transaksi (Simpan ke Firebase atau update state)
                    alert("Transfer sebesar " + nominal + " berhasil dilakukan!");
                    // Tambahkan logika update database di sini
                }
            }
        });

        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) {
                scanner.start(cameras[0]);
            } else {
                console.error('Kamera tidak ditemukan.');
            }
        }).catch(function (e) { console.error(e); });
    </script>
</body>
</html>
